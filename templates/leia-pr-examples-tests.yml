name: Example Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  examples:
    name: ${{ matrix.example }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        example:
          - example-name
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Prepare release-shaped build
        shell: bash
        run: |
          # Replace this with the repo's build or dist-prep step.
          bun run build
          # Optional: stamp the shipped entrypoint here when the repo tests a release-shaped artifact.
          version-injector dist/script-name.sh --style sh --version "dev"
      - name: Put prepared entrypoint on PATH
        shell: bash
        run: echo "$PWD/dist" >> "$GITHUB_PATH"
      - name: Run Leia-backed example
        shell: bash
        run: |
          mkdir -p examples/.tmp
          TMPDIR="$PWD/examples/.tmp" ./node_modules/.bin/leia "examples/${{ matrix.example }}/README.md" -c "Destroy tests" --stdin
